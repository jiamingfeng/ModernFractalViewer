name: Win/macOS/Linux64/LinuxARM64 Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fractal-viewer-windows
            binary: fractal-viewer.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fractal-viewer-macos
            binary: fractal-viewer
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: fractal-viewer-linux
            binary: fractal-viewer
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: fractal-viewer-linux-arm64
            binary: fractal-viewer

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux: install system dependencies for wgpu/winit
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libvulkan-dev \
            vulkan-tools \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p fractal-app

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          chmod +x dist/${{ matrix.binary }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: 30
