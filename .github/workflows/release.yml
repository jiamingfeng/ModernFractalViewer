name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string
      platform:
        description: 'Platform to build (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
          - web
          - android

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Create draft release with tag
  # ─────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release notes
        id: release_notes
        run: |
          if [ -f ReleaseNotes.md ]; then
            # Use delimiter to handle multi-line content
            echo "body<<EOF" >> $GITHUB_OUTPUT
            cat ReleaseNotes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=Release v${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ inputs.version }}
          release_name: Fractal Viewer v${{ inputs.version }}
          body: ${{ steps.release_notes.outputs.body }}
          draft: true
          prerelease: false

  # ─────────────────────────────────────────────
  # Windows build
  # ─────────────────────────────────────────────
  build-windows:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    name: Build Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-windows

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc -p fractal-app

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/x86_64-pc-windows-msvc/release/fractal-viewer.exe" staging/
          Compress-Archive -Path staging/* -DestinationPath "fractal-viewer-v${{ inputs.version }}-windows-x64.zip"

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: fractal-viewer-v${{ inputs.version }}-windows-x64.zip
          asset_name: fractal-viewer-v${{ inputs.version }}-windows-x64.zip
          asset_content_type: application/zip

  # ─────────────────────────────────────────────
  # macOS builds (ARM + x64)
  # ─────────────────────────────────────────────
  build-macos:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'macos'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: macos-x64
    runs-on: ${{ matrix.os }}
    name: Build macOS (${{ matrix.suffix }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.suffix }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p fractal-app

      - name: Package artifact
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/fractal-viewer staging/
          chmod +x staging/fractal-viewer
          cd staging && tar -czf "../fractal-viewer-v${{ inputs.version }}-${{ matrix.suffix }}.tar.gz" fractal-viewer

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: fractal-viewer-v${{ inputs.version }}-${{ matrix.suffix }}.tar.gz
          asset_name: fractal-viewer-v${{ inputs.version }}-${{ matrix.suffix }}.tar.gz
          asset_content_type: application/gzip

  # ─────────────────────────────────────────────
  # Linux build
  # ─────────────────────────────────────────────
  build-linux:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    name: Build Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libvulkan-dev \
            vulkan-tools \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu -p fractal-app

      - name: Package artifact
        run: |
          mkdir -p staging
          cp target/x86_64-unknown-linux-gnu/release/fractal-viewer staging/
          chmod +x staging/fractal-viewer
          cd staging && tar -czf "../fractal-viewer-v${{ inputs.version }}-linux-x64.tar.gz" fractal-viewer

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: fractal-viewer-v${{ inputs.version }}-linux-x64.tar.gz
          asset_name: fractal-viewer-v${{ inputs.version }}-linux-x64.tar.gz
          asset_content_type: application/gzip

  # ─────────────────────────────────────────────
  # WebGPU / WASM build
  # ─────────────────────────────────────────────
  build-web:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'web'
    runs-on: ubuntu-latest
    name: Build WebGPU (WASM)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-wasm

      - name: Install trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          sudo mv trunk /usr/local/bin/

      - name: Build WASM with trunk
        working-directory: crates/fractal-app
        run: trunk build --release

      - name: Package artifact
        run: |
          cd crates/fractal-app
          tar -czf "../../fractal-viewer-v${{ inputs.version }}-web.tar.gz" -C dist .

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: fractal-viewer-v${{ inputs.version }}-web.tar.gz
          asset_name: fractal-viewer-v${{ inputs.version }}-web.tar.gz
          asset_content_type: application/gzip

  # ─────────────────────────────────────────────
  # Android build
  # ─────────────────────────────────────────────
  build-android:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'android'
    runs-on: ubuntu-latest
    name: Build Android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;25.1.8937393"

      - name: Build native libraries
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.1.8937393
        run: |
          cargo ndk \
            -t aarch64-linux-android \
            -t armv7-linux-androideabi \
            -t x86_64-linux-android \
            --platform 30 \
            -o android/app/src/main/jniLibs \
            build -p fractal-app --lib --release

      - name: Build APK with Gradle
        working-directory: android
        env:
          SKIP_CARGO_NDK: 'true'
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             fractal-viewer-v${{ inputs.version }}-android.apk

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: fractal-viewer-v${{ inputs.version }}-android.apk
          asset_name: fractal-viewer-v${{ inputs.version }}-android.apk
          asset_content_type: application/vnd.android.package-archive
