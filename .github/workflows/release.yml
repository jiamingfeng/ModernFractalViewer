name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string
      platform:
        description: 'Platform to build (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
          - linux-arm64
          - web
          - android

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Run full test suite before releasing
  # ─────────────────────────────────────────────
  test:
    uses: ./.github/workflows/test.yml

  # ─────────────────────────────────────────────
  # Create git tag and draft release
  # ─────────────────────────────────────────────
  create-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Fractal Viewer v${{ inputs.version }}
          body_path: ReleaseNotes.md
          draft: true
          prerelease: false

  # ─────────────────────────────────────────────
  # Windows build
  # ─────────────────────────────────────────────
  build-windows:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    name: Build Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-windows

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc -p fractal-app

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/x86_64-pc-windows-msvc/release/fractal-viewer.exe" staging/
          Compress-Archive -Path staging/* -DestinationPath "fractal-viewer-v${{ inputs.version }}-windows-x64.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: fractal-viewer-v${{ inputs.version }}-windows-x64.zip

  # ─────────────────────────────────────────────
  # macOS build (ARM)
  # ─────────────────────────────────────────────
  build-macos:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'macos'
    runs-on: macos-latest
    name: Build macOS (ARM)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-arm64

      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin -p fractal-app

      - name: Package artifact
        run: |
          mkdir -p staging
          cp target/aarch64-apple-darwin/release/fractal-viewer staging/
          chmod +x staging/fractal-viewer
          cd staging && tar -czf "../fractal-viewer-v${{ inputs.version }}-macos-arm64.tar.gz" fractal-viewer

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: fractal-viewer-v${{ inputs.version }}-macos-arm64.tar.gz

  # ─────────────────────────────────────────────
  # Linux build (x86_64)
  # ─────────────────────────────────────────────
  build-linux:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    name: Build Linux (x64)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libvulkan-dev \
            vulkan-tools \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu -p fractal-app

      - name: Package artifact
        run: |
          mkdir -p staging
          cp target/x86_64-unknown-linux-gnu/release/fractal-viewer staging/
          chmod +x staging/fractal-viewer
          cd staging && tar -czf "../fractal-viewer-v${{ inputs.version }}-linux-x64.tar.gz" fractal-viewer

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: fractal-viewer-v${{ inputs.version }}-linux-x64.tar.gz

  # ─────────────────────────────────────────────
  # Linux ARM64 build (Raspberry Pi 4 / 5, etc.)
  # ─────────────────────────────────────────────
  build-linux-arm64:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'linux-arm64'
    runs-on: ubuntu-24.04-arm
    name: Build Linux (ARM64)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-arm64

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libvulkan-dev \
            vulkan-tools \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev

      - name: Build release
        run: cargo build --release --target aarch64-unknown-linux-gnu -p fractal-app

      - name: Package artifact
        run: |
          mkdir -p staging
          cp target/aarch64-unknown-linux-gnu/release/fractal-viewer staging/
          chmod +x staging/fractal-viewer
          cd staging && tar -czf "../fractal-viewer-v${{ inputs.version }}-linux-arm64.tar.gz" fractal-viewer

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: fractal-viewer-v${{ inputs.version }}-linux-arm64.tar.gz

  # ─────────────────────────────────────────────
  # WebGPU / WASM build
  # ─────────────────────────────────────────────
  build-web:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'web'
    runs-on: ubuntu-latest
    name: Build WebGPU (WASM)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-wasm

      - name: Install trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          sudo mv trunk /usr/local/bin/

      - name: Build WASM with trunk
        working-directory: crates/fractal-app
        run: trunk build --release

      - name: Package artifact
        run: |
          cd crates/fractal-app
          tar -czf "../../fractal-viewer-v${{ inputs.version }}-web.tar.gz" -C dist .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: fractal-viewer-v${{ inputs.version }}-web.tar.gz

  # ─────────────────────────────────────────────
  # Android build
  # ─────────────────────────────────────────────
  build-android:
    needs: create-release
    if: inputs.platform == 'all' || inputs.platform == 'android'
    runs-on: ubuntu-latest
    name: Build Android

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;25.1.8937393"

      - name: Build native libraries
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.1.8937393
        run: |
          cargo ndk \
            -t aarch64-linux-android \
            -t armv7-linux-androideabi \
            -t x86_64-linux-android \
            --platform 30 \
            -o android/app/src/main/jniLibs \
            build -p fractal-app --lib --release

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/release.jks

      - name: Build APK with Gradle
        working-directory: android
        env:
          SKIP_CARGO_NDK: 'true'
          KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_BASE64 && 'release.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk \
               fractal-viewer-v${{ inputs.version }}-android.apk
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
               fractal-viewer-v${{ inputs.version }}-android.apk
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: fractal-viewer-v${{ inputs.version }}-android.apk
