name: Build WebGPU (WASM)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    name: Build WASM/WebGPU

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32

      - name: Install trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          sudo mv trunk /usr/local/bin/

      - name: Build WASM with trunk
        working-directory: crates/fractal-app
        run: trunk build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fractal-viewer-web
          path: crates/fractal-app/dist/
          retention-days: 30
