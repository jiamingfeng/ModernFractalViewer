name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macOS
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: Linux x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: Linux ARM64

    runs-on: ${{ matrix.os }}
    name: Test ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.target }}

      # Linux: install system dependencies for wgpu/winit
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libvulkan-dev \
            vulkan-tools \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --profile ci

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-report-${{ matrix.name }}
          path: target/nextest/ci/junit.xml
          retention-days: 30

      - name: Publish test results
        if: always() && github.event_name != 'workflow_call'
        uses: dorny/test-reporter@v2
        with:
          name: Test Results (${{ matrix.name }})
          path: target/nextest/ci/junit.xml
          reporter: java-junit

  check-android:
    runs-on: ubuntu-latest
    name: Check Android

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check-android

      - name: Check Android compilation
        run: cargo check -p fractal-app --target aarch64-linux-android
